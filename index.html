<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deutsch Hub - Mehdi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        body { font-family: 'Tajawal', sans-serif; background-color: #f8fafc; }
        .tab-btn.active { background-color: #4f46e5; color: white; transform: scale(1.05); }
        .answer-btn { transition: all 0.2s; }
        .answer-btn:active { transform: scale(0.95); }
    </style>
</head>
<body class="p-4 pb-10">
    <div class="max-w-3xl mx-auto">
        <header class="text-center py-6 bg-white rounded-3xl shadow-sm mb-6 border-t-8 border-indigo-600">
            <h1 class="text-2xl font-bold text-indigo-900">🇩🇪 منصة مهدي للتعلم</h1>
            <p class="text-gray-500 italic">طريقك للنجاح في امتحان B2</p>
        </header>

        <div class="grid grid-cols-2 gap-2 mb-8">
            <button onclick="showSection('dict')" id="dictTab" class="tab-btn active p-4 rounded-2xl font-bold bg-white shadow-sm transition-all">📖 القاموس</button>
            <button onclick="startQuiz()" id="quizTab" class="tab-btn p-4 rounded-2xl font-bold bg-white shadow-sm transition-all">🧠 وضع الاختبار</button>
        </div>

        <div id="dictSection">
            <div class="relative mb-6">
                <input type="text" id="searchInput" onkeyup="search()" placeholder="قلب على أي كلمة..." class="w-full p-4 rounded-2xl border-none shadow-md pr-12 focus:ring-2 focus:ring-indigo-400">
                <i class="fas fa-search absolute left-4 top-5 text-gray-300"></i>
            </div>
            <div id="wordsList" class="grid gap-3"></div>
        </div>

        <div id="quizSection" class="hidden">
            <div class="bg-white p-8 rounded-3xl shadow-2xl text-center border-2 border-indigo-100">
                <div class="flex justify-between items-center mb-6">
                    <span id="score" class="bg-green-100 text-green-700 px-4 py-1 rounded-full font-bold">نقاط: 0</span>
                    <span id="timer" class="text-indigo-400 font-bold"><i class="fas fa-brain"></i> اختبر نفسك</span>
                </div>
                <h2 class="text-gray-400 mb-2">ما هو معنى الكلمة التالية؟</h2>
                <div id="qWord" class="text-4xl font-bold text-indigo-800 mb-10">---</div>
                <div id="optionsGrid" class="grid grid-cols-1 gap-4"></div>
                <div id="quizFeedback" class="mt-8 font-bold text-xl h-10"></div>
                <button onclick="nextQuestion()" class="mt-8 text-indigo-600 font-bold underline">سؤال موالي ➔</button>
            </div>
        </div>
    </div>

    <script>
        const data = [
            {de: "unverzichtbar", ar: "لا غنى عنه"}, {de: "beantragen", ar: "يقدم طلباً"},
            {de: "die Herausforderung", ar: "التحدي"}, {de: "nachhaltig", ar: "مستدام"},
            {de: "stattfinden", ar: "يحدث / يقام"}, {de: "die Erfahrung", ar: "الخبرة"},
            {de: "zuverlässig", ar: "موثوق"}, {de: "ehrlich", ar: "صادق"},
            {de: "entscheiden", ar: "يقرر"}, {de: "die Verantwortung", ar: "المسؤولية"},
            {de: "höflich", ar: "مهذب"}, {de: "flexibel", ar: "مرن"}
        ];

        let score = 0;
        let currentQ = {};

        // Dictionary Function
        function renderDict(list) {
            const container = document.getElementById('wordsList');
            container.innerHTML = list.map(item => `
                <div class="bg-white p-5 rounded-2xl shadow-sm flex justify-between items-center border-r-4 border-indigo-500 cursor-pointer hover:bg-indigo-50 transition-colors" onclick="speak('${item.de}')">
                    <div class="text-right">
                        <div class="text-xl font-bold text-indigo-900">${item.de}</div>
                        <div class="text-gray-500 text-sm font-medium">${item.ar}</div>
                    </div>
                    <i class="fas fa-volume-up text-indigo-300"></i>
                </div>
            `).join('');
        }

        // Quiz Logic
        function startQuiz() {
            showSection('quiz');
            score = 0;
            document.getElementById('score').innerText = `نقاط: ${score}`;
            nextQuestion();
        }

        function nextQuestion() {
            document.getElementById('quizFeedback').innerText = "";
            currentQ = data[Math.floor(Math.random() * data.length)];
            document.getElementById('qWord').innerText = currentQ.de;

            let choices = [currentQ.ar];
            while(choices.length < 4) {
                let randomAr = data[Math.floor(Math.random() * data.length)].ar;
                if(!choices.includes(randomAr)) choices.push(randomAr);
            }
            choices.sort(() => Math.random() - 0.5);

            document.getElementById('optionsGrid').innerHTML = choices.map(choice => `
                <button onclick="checkAnswer('${choice}')" class="answer-btn w-full p-4 rounded-2xl border-2 border-gray-100 hover:border-indigo-500 hover:bg-indigo-50 font-bold text-lg text-gray-700">
                    ${choice}
                </button>
            `).join('');
        }

        function checkAnswer(ans) {
            const feed = document.getElementById('quizFeedback');
            if(ans === currentQ.ar) {
                score++;
                document.getElementById('score').innerText = `نقاط: ${score}`;
                feed.innerHTML = "<span class='text-green-500'>✅ رائع! جواب صحيح</span>";
                speak(currentQ.de);
                setTimeout(nextQuestion, 1500);
            } else {
                feed.innerHTML = `<span class='text-red-500'>❌ خطأ! الصحيح هو: ${currentQ.ar}</span>`;
            }
        }

        function showSection(sec) {
            document.getElementById('dictSection').classList.toggle('hidden', sec !== 'dict');
            document.getElementById('quizSection').classList.toggle('hidden', sec !== 'quiz');
            document.getElementById('dictTab').classList.toggle('active', sec === 'dict');
            document.getElementById('quizTab').classList.toggle('active', sec === 'quiz');
        }

        function search() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            renderDict(data.filter(i => i.de.toLowerCase().includes(q) || i.ar.includes(q)));
        }

        function speak(t) {
            const u = new SpeechSynthesisUtterance(t);
            u.lang = 'de-DE';
            speechSynthesis.speak(u);
        }

        renderDict(data);
    </script>
</body>
</html>
