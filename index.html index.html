<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بحر اللغة الألمانية</title>
    <style>
        body { font-family: sans-serif; background-color: #f0f2f5; text-align: center; padding: 20px; }
        .main-box { max-width: 500px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h1 { color: #d9534f; }
        .search-container { margin: 20px 0; display: flex; gap: 5px; }
        input { padding: 12px; flex: 1; border: 2px solid #ddd; border-radius: 8px; outline: none; }
        button { padding: 12px 20px; background-color: #333; color: white; border: none; border-radius: 8px; cursor: pointer; }
        .card { background: #fff; border-right: 5px solid #d9534f; padding: 15px; margin-top: 20px; text-align: left; direction: ltr; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .loading { display: none; color: #666; margin-top: 10px; }
    </style>
</head>
<body>

<div class="main-box">
    <h1>🇩🇪 بحر الألمانية</h1>
    <div class="search-container">
        <input type="text" id="wordInput" placeholder="اكتب كلمة (مثلاً: Haus)...">
        <button onclick="startSearch()">بحث</button>
    </div>
    <div id="loading" class="loading">جاري البحث... 🌊</div>
    <div id="resultsArea"></div>
</div>

<script>
    async function startSearch() {
        const word = document.getElementById('wordInput').value;
        const resultsArea = document.getElementById('resultsArea');
        const loading = document.getElementById('loading');

        if(!word) { alert("كتب شي كلمة!"); return; }
        loading.style.display = 'block';
        resultsArea.innerHTML = '';

        try {
            const response = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/de/${word}`);
            const data = await response.json();

            if (response.ok) {
                const definition = data[0].meanings[0].definitions[0].definition;
                resultsArea.innerHTML = `
                    <div class="card">
                        <h3 style="color:#d9534f">Bedeutung:</h3>
                        <p>${definition}</p>
                    </div>
                `;
            } else {
                resultsArea.innerHTML = `<p>مالقيناش هاد الكلمة، جرب كلمة أخرى.</p>`;
            }
        } catch (error) {
            resultsArea.innerHTML = `<p>وقع مشكل فالاتصال.</p>`;
        }
        loading.style.display = 'none';
    }
</script>

</body>
</html>
